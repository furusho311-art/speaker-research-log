# ====================================================================
# Daily Speaker Research Report — GitHub Actions Workflow
# ====================================================================
# Place this file at:
#   .github/workflows/daily-report.yml
# in the furusho311-art/speaker-research-log repository.
#
# Setup:
#   1. Run `claude setup-token` locally to get an OAuth token
#   2. Add it as a repository secret named CLAUDE_CODE_OAUTH_TOKEN
#   3. Push this file to main branch
#   4. Test with "Run workflow" button on Actions tab
# ====================================================================

name: Daily Speaker Research Report

on:
  schedule:
    # UTC 22:00 = JST 07:00 (毎朝7時に実行)
    - cron: '0 22 * * *'
  workflow_dispatch: # 手動実行ボタンも有効

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ---- 1. リポジトリをチェックアウト ----
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---- 2. git ユーザー設定 ----
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # ---- 3. Claude Code でレポート生成 ----
      - name: Generate daily report with Claude
        uses: anthropics/claude-code-base-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_tools: "WebSearch,WebFetch,Bash,Read,Write,Edit,Grep,Glob"
          prompt: |
            あなたはスピーカー・音響技術の研究ログリポジトリの自動レポート生成エージェントです。
            リポジトリはカレントディレクトリにチェックアウト済みです。

            以下の手順でレポートを生成し、git commit & push してください。

            ---

            ## ステップ1: 日付と既存レポートの確認

            1. 今日の日付を確認する（YYYY-MM-DD形式）
            2. `reports/` ディレクトリを確認し、今日分のレポートファイルが既に存在する場合はタスクを終了する
            3. `index/by-topic.md` を読み込み、**過去のレポートで取り上げたテーマ・記事・URLを把握する**（同じ記事・同じURLを二度使わないために必須）
            4. `reports/2026/03/2026-03-28.md` を**品質リファレンス**として読む。本ファイルが目指すべき構造・密度・章立て・表現粒度の基準。以降のステップでは常にこれに準拠する。

            ---

            ## ステップ2: 業界全体の最新動向を幅広く調査（WebSearch 12～16回）

            スピーカー・音響業界全体を対象に、**当日の最新ニュース・発表・論文を幅広くスキャンする**。

            ### 製品・市場ニュース（英語2～3回、日本語1～2回）
            - PA・プロオーディオ、ホームオーディオ、カーオーディオ、イヤホン/ヘッドホン、サウンドバー、スマートスピーカー、MEMSスピーカー、超音波スピーカー、ハプティクス、骨伝導などの**業界全体**を横断的にスキャンする
            - ホームオーディオは新製品・新技術ニュースのみ対象。主観的な音質評価レビューや定量的でない評論記事は対象外
            - 当日または直近のタイムリーなニュース・発表・学会・特許公開を優先する

            ### 技術・研究（英語2～3回）
            - 振動板・磁気回路・エンクロージャ・DSP・BEM/FEM・非線形音響・音響メタマテリアル・AI×音響・イマーシブオーディオ・心理音響などの**気になる技術領域を自由に探索**する

            ### 論文・特許（**毎回必ず3～5回**、最低3件はテーブル化）
            以下のソースを必ず検索する：
            - JASA（Journal of the Acoustical Society of America）: `site:asa.scitation.org`
            - AES Journal / AES Convention: `site:aes.org`
            - arXiv (eess.AS, cs.SD, physics.class-ph): `site:arxiv.org`
            - IEEE Transactions on Audio, Speech, and Language Processing
            - USPTO / EPO 特許公開
            - EURASIP JASMP, MDPI Sensors/Applied Sciences なども可

            ### 業界・ビジネス（1～2回）
            - メーカーの決算・買収・提携・戦略発表
            - 市場規模・成長率レポート
            - サプライチェーン・製造技術の動向

            ---

            ## ステップ3: テーマの選定

            収集した情報全体を俯瞰し、**エージェント自身が最も価値あるテーマを選定する**。

            選定の基準：
            - 当日のタイムリーなニュース・発表・学会・特許公開がある
            - 過去のレポートでまだカバーしていない領域・視点
            - 複数のニュースや論文が同一テーマに集中しており特集記事として深掘りできる
            - PA・プロオーディオ関連はやや積極的に取り上げてよい
            - 研究論文・特許の新情報が充実している場合はそれを特集に選んでもよい

            ---

            ## ステップ4: レポートの生成（2026-03-28準拠の構造）

            以下フォーマットで `reports/YYYY/MM/YYYY-MM-DD.md` を生成する。
            ディレクトリが存在しない場合は `mkdir -p` で作成する。
            **5セクション構成（特集 / 業界ニュース / 技術トレンド / 論文・特許・規格 / 未来予測）は省略不可**。

            ````markdown
            ---
            date: YYYY-MM-DD
            theme: "テーマタイトル（50～80字程度）"
            tags: [タグ1, タグ2, タグ3, ... タグN]
            summary: "200～300字の要約。テーマの全体像と未来予測の結論まで含めて書く"
            ---

            # テーマタイトル

            ---

            ## 今日のハイライト

            - **トピック1**: 概要（1～2行）
            - **トピック2**: 概要
            - **トピック3**: 概要
            - **トピック4**: 概要
            - **トピック5**: 概要
            - **トピック6**: 概要
            - **トピック7**: 概要

            （**7項目**を目安に。業界ニュース・技術・論文・市場動向をバランスよく）

            ---

            ## 目次

            1. [特集：メインテーマ](#特集)
            2. [業界ニュース・新製品](#業界ニュース)
            3. [技術トレンド・注目技術](#技術トレンド)
            4. [論文・特許・規格](#論文特許)
            5. [未来予測](#未来予測)

            ---

            ## 特集：メインテーマ {#特集}

            **メインテーマ全体は 2500～3500字。以下の6章構造で書くこと（省略不可）。**

            ### 第1章：背景と文脈（300～500字）
            （なぜ今このテーマが重要か。業界的背景・歴史的経緯）

            ### 第2章：現状の技術・製品（400～600字）
            （各社の動き、主要製品、スペック比較。**Markdown表を1つ以上含めること**）

            ### 第3章：技術的詳細（500～700字）
            （アーキテクチャ、DSP/BEM/磁気回路など技術深掘り。数式・図解への言及可）

            ### 第4章：市場動向と競合（300～500字）
            （価格帯、ターゲット市場、競合比較）

            ### 第5章：課題と制約（300～400字）
            （技術的制約、市場的ハードル、標準化の遅れなど）

            ### 第6章：今後の展望（300～500字）
            （短期・中期の発展方向。最後の未来予測セクションへ接続）

            ---

            ## 業界ニュース・新製品 {#業界ニュース}

            ### トピック1タイトル
            （300～500字の解説。**出典リンク必須**。製品であれば仕様表を添える）

            | 項目 | 内容 |
            |---|---|
            | 型番 | ... |
            | 価格 | ... |
            | 主要仕様 | ... |
            | 発売時期 | ... |

            ### トピック2タイトル
            （同上、300～500字 + 必要に応じて表）

            ### トピック3タイトル
            （最低2件、可能なら3～4件）

            ---

            ## 技術トレンド・注目技術 {#技術トレンド}

            （500～800字の技術深掘り。**出典リンク必須**。複数技術なら小見出し `###` で区切る。比較は**表で整理**すること）

            ---

            ## 論文・特許・規格 {#論文特許}

            **最低3件、可能なら5～9件を table 形式で整理し、特に重要な arXiv preprints は別枠で200～400字の解説を付ける。**

            ### 主要論文・特許

            | タイトル | 著者 | 誌/会議 | 日付 | DOI/URL | 要点 |
            |---|---|---|---|---|---|
            | ... | ... | JASA / AES / arXiv / IEEE / USPTO | YYYY-MM-DD | [link](url) | 50～100字 |

            ### 注目 arXiv preprints

            #### arXiv:XXXX.XXXXX — タイトル
            （200～400字の解説。手法・結果・応用可能性を記述。**DOI/arXiv URL 必須**）

            （情報が見つからない場合は「今回の検索では該当なし」と明記。省略不可）

            ---

            ## 未来予測 {#未来予測}

            **本日の情報群から導かれる今後の発展方向を3つ、番号付きで提示する（各 200～400字）。**

            ### 1. 方向性タイトル
            （根拠となる当日の情報を引用しつつ、短期（1年以内）・中期（3～5年）の予測を示す）

            ### 2. 方向性タイトル
            （同上）

            ### 3. 方向性タイトル
            （同上）

            ---

            *レポート生成：Speaker Research Bot | YYYY-MM-DD*
            ````

            ---

            ## ステップ5: git commit & push

            レポートファイルを書き終えたら、Bashツールで以下を実行する：

            ```bash
            git add reports/YYYY/MM/YYYY-MM-DD.md
            git commit -m "📊 YYYY-MM-DD 日次レポート: テーマタイトル（短縮版）"
            ```

            ---

            ## ステップ6: index/by-topic.md の更新

            1. `index/by-topic.md` を読み込む
            2. 今日のレポートに対応するセクション（テーマカテゴリ）を探す。セクションが存在しない場合は末尾に新規作成する
            3. テーブル行を追記する（タグは **compact 形式から抜粋5～8個** に短縮）：
               ```
               | [YYYY-MM-DD](../reports/YYYY/MM/YYYY-MM-DD.md) | **特集**：テーマタイトル | タグ1, タグ2, タグ3, タグ4, タグ5 |
               ```
            4. 追記してコミット：
               ```bash
               git add index/by-topic.md
               git commit -m "📝 YYYY-MM-DD インデックス更新: テーマカテゴリ追加"
               ```

            ---

            ## ステップ7: push して完了報告

            ```bash
            git push origin main
            ```

            最後に以下の完了報告を出力する：
            - pushしたレポートのGitHub URL
            - 選定したテーマとその理由
            - 主な論文・ニュース3～5件の要点
            - 使用した検索クエリの一覧

            ---

            ## 品質チェックリスト（push前に必ず自己検証）

            以下がすべて満たされていることを確認してからcommitする。不足があれば修正。

            - [ ] YAML frontmatter の `tags:` が compact array 形式 `[...]`、10～25個
            - [ ] 今日のハイライトが7項目前後
            - [ ] 目次が5セクション（未来予測含む）
            - [ ] 特集に第1章～第6章の見出しが全て存在
            - [ ] 特集内に Markdown 表が最低1つ
            - [ ] 業界ニュースに仕様表が最低1つ
            - [ ] 論文・特許セクションに table と arXiv preprints の別枠がある
            - [ ] 論文 table に最低3行
            - [ ] 未来予測が番号付き3方向
            - [ ] 各セクション末尾に出典リンクがある
            - [ ] ファイル末尾に `*レポート生成：Speaker Research Bot | YYYY-MM-DD*` フッター

            ---

            ## 注意事項

            - **過去レポートと同じ記事・URLは使用しない**。ステップ1で確認した被りカバー済み情報はスキップ
            - WebFetchは論文アブストラクト等の深掘りが必要な場合のみ使用（トークン節約）
            - すべての情報に出典URL（クリッカブルリンク）を付ける
            - レポートは日本語で記述。固有名詞・製品名・技術用語は英語表記を併用する
            - 論文セクションは「該当なし」でも必ず記載する（省略不可）
            - ファイル書き込みにはWriteツールを使う（ブラウザ操作は不要）
            - git push が失敗した場合は、エラーメッセージを出力して終了する

      # ---- 4. フォールバック: Claude が push しなかった場合 ----
      - name: Fallback commit & push
        if: always()
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "✅ No uncommitted changes (Claude handled everything)"
          else
            echo "⚠️ Fallback: committing remaining changes"
            git commit -m "📊 daily report (fallback commit)"
            git push origin main
          fi
