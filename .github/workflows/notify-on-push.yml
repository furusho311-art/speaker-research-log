name: Report Push Notification

on:
  push:
    paths:
      - 'reports/**/*.md'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Comment on notification issue
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: 1
          body: |
            ## 📝 新しいレポートが公開されました

            ${{ github.event.head_commit.message }}

            👉 [レポートを見る](https://github.com/${{ github.repository }}/tree/main/reports)
